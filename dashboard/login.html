<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oracle P1 - Bot 1 — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #030712; }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #1f2937 inset !important; -webkit-text-fill-color: #f3f4f6 !important; }
  </style>
</head>
<body class="text-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-5xl mb-4">🤖</div>
      <h1 class="text-xl font-bold text-white">Oracle P1 - Bot 1</h1>
      <p class="text-gray-500 text-sm mt-1">Sign in to access the dashboard</p>
    </div>

    <!-- Card -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-2xl">
      <form id="loginForm" class="space-y-4">

        <div>
          <label for="username" class="block text-xs text-gray-500 mb-1.5">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" autofocus
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-white text-sm
                        focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition">
        </div>

        <div>
          <label for="password" class="block text-xs text-gray-500 mb-1.5">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password"
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-white text-sm
                        focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition">
        </div>

        <!-- Error message -->
        <div id="errorBox"
             class="hidden rounded-lg border border-red-500/30 bg-red-500/10 text-red-400 text-xs text-center py-2 px-3">
        </div>

        <button type="submit" id="submitBtn"
                class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 rounded-lg
                       text-white text-sm font-semibold transition disabled:opacity-50 disabled:cursor-not-allowed">
          Sign In
        </button>

      </form>
    </div>

  </div>

  <script>
    const form    = document.getElementById('loginForm');
    const errBox  = document.getElementById('errorBox');
    const btn     = document.getElementById('submitBtn');

    function showError(msg) {
      errBox.textContent = msg;
      errBox.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please enter your username and password.');
        return;
      }

      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        if (r.ok) {
          location.href = '/';
        } else {
          const d = await r.json().catch(() => ({}));
          showError(d.error || 'Invalid username or password.');
        }
      } catch {
        showError('Network error — please try again.');
      }
    });
  </script>
</body>
</html>
